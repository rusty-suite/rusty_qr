<?xml version="1.0" encoding="UTF-8"?>
<!--
  RustyQR Theme: Verre Givré (Glassmorphisme)
  Fond coloré en dégradé, panneau translucide givré pour le contenu.
  Bordure intérieure lumineuse, effet de profondeur moderne.

  @palette BG=#C9D6FF FG=#1A1A2E AC=#5A67D8

  Variables: {{W}} {{H}} {{BG}} {{FG}} {{AC}} {{QR_IMAGE}}
             {{TX}} {{TA}} {{TY0}}..{{TY4}} {{AX}} {{AY}} {{AW}} {{AH}}
             {{F0:default}}..{{F4:default}}
             {{C0:#5A67D8|Indigo}} {{C1:#EE9AE5|Rose}} {{C2:#FFFFFF|Blanc verre}}
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="{{W}}" height="{{H}}" viewBox="0 0 {{W}} {{H}}">

  <defs>
    <!-- Fond dégradé coloré -->
    <linearGradient id="bgfull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C9D6FF"/>
      <stop offset="50%"  stop-color="#EE9AE5"/>
      <stop offset="100%" stop-color="#5A67D8"/>
    </linearGradient>
    <!-- Panneau verre (blanc semi-transparent) -->
    <linearGradient id="glasspanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <!-- Reflet haut du panneau verre -->
    <linearGradient id="glassshine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="30%"  stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Ombre douce portée sur le fond -->
    <filter id="glassblur" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3040A0" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Fond coloré dégradé -->
  <rect width="{{W}}" height="{{H}}" fill="url(#bgfull)"/>

  <!-- Orbes flous en arrière-plan pour l'effet glassmorphism -->
  <circle cx="20%" cy="30%" r="28%" fill="{{C1:#EE9AE5}}" opacity="0.35"/>
  <circle cx="75%" cy="65%" r="22%" fill="{{C0:#5A67D8}}" opacity="0.30"/>

  <!-- Panneau verre principal (tout l'espace de la carte) -->
  <rect x="5" y="5" width="{{W}}" height="{{H}}"
        fill="url(#glasspanel)"
        stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.60"
        rx="10" filter="url(#glassblur)" transform="translate(-5,-5)"/>

  <!-- Reflet haut panneau -->
  <rect x="5" y="5" width="{{W}}" height="30%"
        fill="url(#glassshine)" rx="10"
        transform="translate(-5,-5)"/>

  <!-- Code QR -->
  {{QR_IMAGE}}

  <!-- Barre de séparation verre -->
  <rect x="{{AX}}" y="{{AY}}" width="{{AW}}" height="{{AH}}"
        fill="#FFFFFF" opacity="0.35" rx="2"/>

  <!-- Texte — blanc avec ombre douce pour lisibilité sur verre -->
  <text x="{{TX}}" y="{{TY0}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" font-weight="bold"
        fill="#FFFFFF" opacity="0.95">{{F0:Votre Nom}}</text>

  <text x="{{TX}}" y="{{TY1}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="#FFFFFF" opacity="0.75">{{F1:Titre / Poste}}</text>

  <text x="{{TX}}" y="{{TY2}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#FFFFFF" opacity="0.60">{{F2:Téléphone}}</text>

  <text x="{{TX}}" y="{{TY3}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#FFFFFF" opacity="0.60">{{F3:Email}}</text>

  <text x="{{TX}}" y="{{TY4}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#FFFFFF" opacity="0.80">{{F4:Site web}}</text>

</svg>
