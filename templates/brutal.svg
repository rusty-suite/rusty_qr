<?xml version="1.0" encoding="UTF-8"?>
<!--
  RustyQR Theme: Brutaliste
  Design brut et sans compromis : fond blanc, contours noirs épais,
  bloc décalé en guise d'ombre portée, accent rouge vif, zéro dégradé.

  @palette BG=#FFFFFF FG=#000000 AC=#FF3300

  Variables: {{W}} {{H}} {{BG}} {{FG}} {{AC}} {{QR_IMAGE}}
             {{TX}} {{TA}} {{TY0}}..{{TY4}} {{AX}} {{AY}} {{AW}} {{AH}}
             {{F0:default}}..{{F4:default}}
             {{C0:#FF3300|Rouge brutal}} {{C1:#000000|Noir}} {{C2:#FFDD00|Jaune}}
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="{{W}}" height="{{H}}" viewBox="0 0 {{W}} {{H}}">

  <!-- Ombre portée décalée (rectangle noir décalé +4,+4) -->
  <rect x="4" y="4" width="{{W}}" height="{{H}}" fill="{{C1:#000000}}"
        transform="translate(-4,-4)"/>

  <!-- Fond blanc principal -->
  <rect x="0" y="0" width="{{W}}" height="{{H}}" fill="{{BG}}"/>

  <!-- Bordure épaisse noire -->
  <rect x="0" y="0" width="{{W}}" height="{{H}}"
        fill="none" stroke="{{C1:#000000}}" stroke-width="3"/>

  <!-- Bande rouge accent (épaisse, haut) -->
  <rect x="0" y="0" width="{{W}}" height="10" fill="{{C0:#FF3300}}"/>

  <!-- Bloc jaune accent dans le coin bas-droit (décoration brutale) -->
  <rect x="{{W}}" y="{{H}}" width="28" height="28"
        fill="{{C2:#FFDD00}}" transform="translate(-28,-28)"/>
  <rect x="{{W}}" y="{{H}}" width="28" height="28"
        fill="none" stroke="{{C1:#000000}}" stroke-width="2"
        transform="translate(-28,-28)"/>

  <!-- Code QR -->
  {{QR_IMAGE}}

  <!-- Barre verticale noire (séparateur brutal) -->
  <rect x="{{AX}}" y="{{AY}}" width="{{AW}}" height="{{AH}}"
        fill="{{C1:#000000}}"/>

  <!-- Trait horizontal noir sous le nom -->
  <line x1="{{TX}}" y1="{{TY0}}" x2="{{TX}}" y2="{{TY0}}"
        stroke="{{C0:#FF3300}}" stroke-width="0" transform="translate(0,2)"/>

  <!-- Nom — noir gras, uppercase, espacement brutal -->
  <text x="{{TX}}" y="{{TY0}}" text-anchor="{{TA}}"
        font-family="'Arial Black', 'Impact', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="900" letter-spacing="0.5"
        fill="{{C1:#000000}}">{{F0:VOTRE NOM}}</text>

  <!-- Filet rouge sous le nom -->
  <rect x="{{TX}}" y="{{TY0}}" width="70" height="2"
        fill="{{C0:#FF3300}}" transform="translate(-2,2)"/>

  <!-- Titre — rouge -->
  <text x="{{TX}}" y="{{TY1}}" text-anchor="{{TA}}"
        font-family="'Arial Black', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="bold" fill="{{C0:#FF3300}}">{{F1:Titre / Poste}}</text>

  <text x="{{TX}}" y="{{TY2}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="{{C1:#000000}}" opacity="0.65">{{F2:Téléphone}}</text>

  <text x="{{TX}}" y="{{TY3}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="{{C1:#000000}}" opacity="0.65">{{F3:Email}}</text>

  <text x="{{TX}}" y="{{TY4}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="{{C1:#000000}}" opacity="0.50">{{F4:Site web}}</text>

</svg>
