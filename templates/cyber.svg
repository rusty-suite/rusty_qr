<?xml version="1.0" encoding="UTF-8"?>
<!--
  RustyQR Theme: Cyberpunk
  Fond noir, accents jaune électrique et magenta, lignes de scan,
  cadre de terminal en coin, typographie monospace.

  @palette BG=#080808 FG=#F0F0F0 AC=#FFE600

  Variables: {{W}} {{H}} {{BG}} {{FG}} {{AC}} {{QR_IMAGE}}
             {{TX}} {{TA}} {{TY0}}..{{TY4}} {{AX}} {{AY}} {{AW}} {{AH}}
             {{F0:default}}..{{F4:default}}
             {{C0:#FFE600|Jaune électrique}} {{C1:#FF2D78|Magenta}} {{C2:#00FF9F|Vert cyber}}
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="{{W}}" height="{{H}}" viewBox="0 0 {{W}} {{H}}">

  <defs>
    <!-- Scanlines : motif horizontal fin -->
    <pattern id="scan" x="0" y="0" width="{{W}}" height="3"
             patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="{{W}}" height="3" fill="transparent"/>
      <line x1="0" y1="1.5" x2="{{W}}" y2="1.5"
            stroke="#000000" stroke-width="0.7" opacity="0.35"/>
    </pattern>
    <!-- Lueur jaune -->
    <filter id="yellglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Lueur magenta -->
    <filter id="maglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Fond avec vignettage -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <!-- Fond noir avec vignette -->
  <rect width="{{W}}" height="{{H}}" fill="url(#vignette)"/>

  <!-- Ligne de scan sur tout le fond -->
  <rect width="{{W}}" height="{{H}}" fill="url(#scan)"/>

  <!-- Bande de haut en jaune (fine) -->
  <rect x="0" y="0" width="{{W}}" height="2" fill="{{C0:#FFE600}}" opacity="0.9"
        filter="url(#yellglow)"/>

  <!-- Bande du bas en magenta -->
  <rect x="0" y="{{H}}" width="{{W}}" height="2" fill="{{C1:#FF2D78}}" opacity="0.85"
        filter="url(#maglow)" transform="translate(0,-2)"/>

  <!-- Cadre terminal — coins en L (haut-gauche) -->
  <line x1="0"  y1="18" x2="0"  y2="4"  stroke="{{C0:#FFE600}}" stroke-width="2" opacity="0.90"/>
  <line x1="0"  y1="4"  x2="18" y2="4"  stroke="{{C0:#FFE600}}" stroke-width="2" opacity="0.90"/>
  <!-- Coins en L (haut-droite) -->
  <line x1="{{W}}"    y1="18" x2="{{W}}"    y2="4"  stroke="{{C1:#FF2D78}}" stroke-width="2" opacity="0.80"/>
  <line x1="{{W}}"    y1="4"  x2="{{W}}" y2="4"  stroke="{{C1:#FF2D78}}" stroke-width="2" opacity="0.80"
        transform="translate(-18,0)"/>
  <!-- Coins en L (bas-gauche) -->
  <line x1="0"  y1="{{H}}" x2="0"  y2="{{H}}"  stroke="{{C0:#FFE600}}" stroke-width="2" opacity="0.80"
        transform="translate(0,-18)"/>
  <line x1="0"  y1="{{H}}" x2="18" y2="{{H}}"  stroke="{{C0:#FFE600}}" stroke-width="2" opacity="0.80"
        transform="translate(0,-4)"/>
  <!-- Coins en L (bas-droite) -->
  <line x1="{{W}}"    y1="{{H}}" x2="{{W}}"    y2="{{H}}"  stroke="{{C1:#FF2D78}}" stroke-width="2" opacity="0.75"
        transform="translate(0,-18)"/>
  <line x1="{{W}}"    y1="{{H}}" x2="{{W}}" y2="{{H}}"  stroke="{{C1:#FF2D78}}" stroke-width="2" opacity="0.75"
        transform="translate(-18,-4)"/>

  <!-- Code QR -->
  {{QR_IMAGE}}

  <!-- Barre de séparation jaune néon -->
  <rect x="{{AX}}" y="{{AY}}" width="{{AW}}" height="{{AH}}"
        fill="{{C0:#FFE600}}" opacity="0.85" filter="url(#yellglow)"/>

  <!-- Indicateur "SYS:ID" au-dessus du nom -->
  <text x="{{TX}}" y="{{TY0}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="7" fill="{{C1:#FF2D78}}" opacity="0.70"
        letter-spacing="1" transform="translate(0,-11)">SYS:ID ▸</text>

  <!-- Nom — jaune, lueur -->
  <text x="{{TX}}" y="{{TY0}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="13" font-weight="bold" letter-spacing="0.5"
        fill="{{C0:#FFE600}}" filter="url(#yellglow)">{{F0:VOTRE NOM}}</text>

  <text x="{{TX}}" y="{{TY1}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="{{C2:#00FF9F}}" opacity="0.85">{{F1:Titre / Poste}}</text>

  <text x="{{TX}}" y="{{TY2}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="{{FG}}" opacity="0.55">{{F2:Téléphone}}</text>

  <text x="{{TX}}" y="{{TY3}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="{{FG}}" opacity="0.55">{{F3:Email}}</text>

  <text x="{{TX}}" y="{{TY4}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="{{C1:#FF2D78}}" opacity="0.80">{{F4:Site web}}</text>

</svg>
