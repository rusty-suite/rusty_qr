<?xml version="1.0" encoding="UTF-8"?>
<!--
  RustyQR Theme: Néon
  Fond sombre avec bordure lumineuse, texte principal en couleur néon.
  Recommandé: BG=#0D0D1A, FG=#E8E8FF, AC=#00FFD1

  @palette BG=#0D0D1A FG=#E8E8FF AC=#00FFD1

  Variables: {{W}} {{H}} {{BG}} {{FG}} {{AC}} {{QR_IMAGE}}
             {{TX}} {{TA}} {{TY0}}..{{TY4}} {{AX}} {{AY}} {{AW}} {{AH}}
             {{F0:default}}..{{F4:default}}
             {{C0:#00FFD1|Couleur néon}}
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="{{W}}" height="{{H}}" viewBox="0 0 {{W}} {{H}}">

  <defs>
    <!-- Filtre lueur néon -->
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Halo ambiant centré -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="{{C0:#00FFD1}}" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="{{BG}}"         stop-opacity="0"/>
    </radialGradient>
    <!-- Dégradé vertical pour la barre accent -->
    <linearGradient id="accentbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="{{C0:#00FFD1}}" stop-opacity="1"/>
      <stop offset="100%" stop-color="{{C0:#00FFD1}}" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Fond sombre -->
  <rect width="{{W}}" height="{{H}}" fill="{{BG}}" rx="6"/>

  <!-- Halo ambiant -->
  <rect width="{{W}}" height="{{H}}" fill="url(#ambient)" rx="6"/>

  <!-- Bordure néon lumineuse -->
  <rect width="{{W}}" height="{{H}}" fill="none"
        stroke="{{C0:#00FFD1}}" stroke-width="1.5" rx="6"
        opacity="0.75" filter="url(#neon)"/>

  <!-- Coins décoratifs (angles) -->
  <line x1="0"       y1="14"      x2="0"       y2="0"       stroke="{{C0:#00FFD1}}" stroke-width="3" opacity="0.9"/>
  <line x1="0"       y1="0"       x2="14"      y2="0"       stroke="{{C0:#00FFD1}}" stroke-width="3" opacity="0.9"/>
  <line x1="{{W}}"   y1="14"      x2="{{W}}"   y2="0"       stroke="{{C0:#00FFD1}}" stroke-width="3" opacity="0.9"/>
  <line x1="{{W}}"   y1="0"       x2="{{W}}"   y2="0"       stroke="{{C0:#00FFD1}}" stroke-width="3" opacity="0.9"/>

  <!-- Code QR -->
  {{QR_IMAGE}}

  <!-- Barre verticale accent (entre QR et texte) -->
  <rect x="{{AX}}" y="{{AY}}" width="{{AW}}" height="{{AH}}"
        fill="url(#accentbar)" rx="1" filter="url(#neon)"/>

  <!-- Nom — néon lumineux -->
  <text x="{{TX}}" y="{{TY0}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" font-weight="bold"
        fill="{{C0:#00FFD1}}" filter="url(#neon)">{{F0:Votre Nom}}</text>

  <!-- Titre — texte clair atténué -->
  <text x="{{TX}}" y="{{TY1}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="{{FG}}" opacity="0.80">{{F1:Titre / Poste}}</text>

  <text x="{{TX}}" y="{{TY2}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="{{FG}}" opacity="0.60">{{F2:Téléphone}}</text>

  <text x="{{TX}}" y="{{TY3}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="{{FG}}" opacity="0.60">{{F3:Email}}</text>

  <text x="{{TX}}" y="{{TY4}}" text-anchor="{{TA}}"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="{{C0:#00FFD1}}" opacity="0.80">{{F4:Site web}}</text>

</svg>
