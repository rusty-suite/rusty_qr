<?xml version="1.0" encoding="UTF-8"?>
<!--
  RustyQR Theme: Tech Isométrique
  Interface de données futuriste : fond navy profond, grille isométrique
  en cyan, barre de progression, typographie monospace froide.

  @palette BG=#0A1628 FG=#E2E8F0 AC=#00D4FF

  Variables: {{W}} {{H}} {{BG}} {{FG}} {{AC}} {{QR_IMAGE}}
             {{TX}} {{TA}} {{TY0}}..{{TY4}} {{AX}} {{AY}} {{AW}} {{AH}}
             {{F0:default}}..{{F4:default}}
             {{C0:#00D4FF|Cyan tech}} {{C1:#FF6B35|Orange accent}} {{C2:#0A1628|Navy}}
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="{{W}}" height="{{H}}" viewBox="0 0 {{W}} {{H}}">

  <defs>
    <!-- Fond navy -->
    <linearGradient id="navybg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0D1F38"/>
      <stop offset="100%" stop-color="#060E1C"/>
    </linearGradient>
    <!-- Grille isométrique (lignes diagonales 30°) -->
    <pattern id="isogrid" x="0" y="0" width="16" height="16"
             patternUnits="userSpaceOnUse">
      <line x1="0" y1="16" x2="16" y2="0"
            stroke="{{C0:#00D4FF}}" stroke-width="0.4" opacity="0.10"/>
      <line x1="-8" y1="8" x2="8"  y2="-8"
            stroke="{{C0:#00D4FF}}" stroke-width="0.4" opacity="0.07"/>
    </pattern>
    <!-- Lueur cyan -->
    <filter id="cyanglow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Lueur orange -->
    <filter id="orangeglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Halo autour QR -->
    <radialGradient id="qrhalo" cx="35%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="{{C0:#00D4FF}}" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="{{C0:#00D4FF}}" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond navy -->
  <rect width="{{W}}" height="{{H}}" fill="url(#navybg)"/>

  <!-- Grille isométrique sur fond -->
  <rect width="{{W}}" height="{{H}}" fill="url(#isogrid)"/>

  <!-- Halo QR -->
  <rect width="{{W}}" height="{{H}}" fill="url(#qrhalo)"/>

  <!-- Barre cyan en haut (indicateur système) -->
  <rect x="0" y="0" width="{{W}}" height="3" fill="{{C0:#00D4FF}}" opacity="0.80"
        filter="url(#cyanglow)"/>

  <!-- Indicateur de charge (barre de progression décorative) -->
  <rect x="0" y="0" width="{{W}}" height="2" fill="#1A2C48"
        transform="translate(0,3)"/>
  <rect x="0" y="0" width="62%" height="2" fill="{{C0:#00D4FF}}" opacity="0.55"
        transform="translate(0,3)"/>

  <!-- Traits isométriques décoratifs en coin bas-droit -->
  <line x1="{{W}}" y1="{{H}}" x2="{{W}}" y2="{{H}}"
        stroke="{{C0:#00D4FF}}" stroke-width="1.2" opacity="0.30"
        transform="translate(-5,-5) rotate(-45,5,5)"/>

  <!-- Code QR -->
  {{QR_IMAGE}}

  <!-- Barre de séparation cyan -->
  <rect x="{{AX}}" y="{{AY}}" width="{{AW}}" height="{{AH}}"
        fill="{{C0:#00D4FF}}" opacity="0.75" filter="url(#cyanglow)"/>

  <!-- Label système au-dessus du nom -->
  <text x="{{TX}}" y="{{TY0}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="7" fill="{{C0:#00D4FF}}" opacity="0.55" letter-spacing="1.5"
        transform="translate(0,-11)">ID//REC</text>

  <!-- Nom — blanc froid, monospace -->
  <text x="{{TX}}" y="{{TY0}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="13" font-weight="bold" letter-spacing="0.3"
        fill="{{FG}}">{{F0:Votre Nom}}</text>

  <!-- Titre — orange accent -->
  <text x="{{TX}}" y="{{TY1}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="{{C1:#FF6B35}}" filter="url(#orangeglow)">{{F1:Titre / Poste}}</text>

  <text x="{{TX}}" y="{{TY2}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="{{FG}}" opacity="0.50">{{F2:Téléphone}}</text>

  <text x="{{TX}}" y="{{TY3}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="{{FG}}" opacity="0.50">{{F3:Email}}</text>

  <text x="{{TX}}" y="{{TY4}}" text-anchor="{{TA}}"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="{{C0:#00D4FF}}" opacity="0.80">{{F4:Site web}}</text>

</svg>
